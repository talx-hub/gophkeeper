edition = "2023";

option go_package = "github.com/talx-hub/gophkeeper/internal/model/common;common";
package gophkeeper.v1.common;

// Метаданные, описывающие объект данных.
// Здесь хранится основная информация для идентификации объекта.
message Metadata {
  enum DataType {
    DATA_TYPE_UNSPECIFIED = 0;
    DATA_TYPE_AUTH = 1;
    DATA_TYPE_CARD = 2;
    DATA_TYPE_BINARY = 3;
  }
  DataType data_type = 1; // Один из типов хранимых данных
  string uuid = 2;        // Уникальный идентификатор записи
  string name = 3;        // Человекочитаемое имя
  string description = 4; // Заметка
  int64 created_at = 5;   // Время создания (unix timestamp)
}

